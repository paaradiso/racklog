---
import glimr/session/session.{type Session}
props(
  label: String,
  id: String,
  name: String,
  session: Session
)
---

<div>
  <label
    :for="id"
    class="block text-sm font-medium text-secondary-foreground mb-1"
  >
    {{ label }}
  </label>
  <input
    @attributes
    :value="session.old(session, name)"
    class="w-full px-3 py-2 border border-input-border rounded-md focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent placeholder:text-muted-foreground"
  />
  <small
    l-if="session.has_error(session, name)"
    class="mt-1 text-sm text-destructive"
  >
    {{ session.error(session, name) }}
  </small>
</div>
