---
import glimr/session/session
import glimr/http/context
import database/main/models/user/gen/user
import app/app.{type App}

props(ctx: context.Context(App), user: user.User)
---

<x-layouts:app>
  <slot name="meta_title">Dashboard</slot>

  <div class="flex items-center justify-center min-h-screen bg-gray-50">
    <div class="w-full max-w-lg p-8 bg-white rounded-lg shadow-md">
      <div
        l-if="session.has_flash(ctx.session, 'message')"
        class="mb-4 p-3 bg-green-100 border border-green-300 text-green-700 rounded"
      >
        {{ session.get_flash(ctx.session, "message") }}
      </div>

      <h1 class="text-2xl font-bold text-gray-900 mb-2">Dashboard</h1>

      <p class="text-gray-600 mb-6">
        Welcome, {{ user.email }}
      </p>

      <form method="post" action="/logout">
        <x-button type="submit" variant="secondary">Logout</x-button>
      </form>
    </div>
  </div>
</x-layouts:app>
