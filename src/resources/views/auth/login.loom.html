---
import glimr/session/session
import glimr/http/context
import app/app.{type App}

props(ctx: context.Context(App))
---

<x-layouts:app>
  <slot name="meta_title">Login</slot>

  <div class="flex items-center justify-center min-h-screen bg-mist-50">
    <div class="w-full max-w-md p-8 bg-white rounded-xl shadow-md">
      <h1 class="text-[22px] font-bold text-center text-mist-800 mb-6">
        Welcome back
      </h1>

      <div
        l-if="session.has_flash(ctx.session, 'error')"
        class="mb-4 p-3 bg-red-100 border border-red-300 text-red-700 rounded"
      >
        {{ session.get_flash(ctx.session, "error") }}
      </div>

      <form method="post" action="/login">
        <div class="mb-4">
          <x-input
            id="name"
            name="email"
            type="email"
            label="Email Address"
            placeholder="name@email.com"
            :session="ctx.session"
          />
        </div>

        <div class="mb-6">
          <x-input
            id="password"
            name="password"
            type="password"
            label="Password"
            placeholder="super-secret-password"
            :session="ctx.session"
          />
        </div>

        <x-button type="submit">Login</x-button>
      </form>

      <p class="mt-4 text-center text-sm text-mist-500">
        Don't have an account?
        <x-link href="/register" class="ml-0.5">Register</x-link>
      </p>
    </div>
  </div>
</x-layouts:app>
