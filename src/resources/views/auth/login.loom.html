---
import glimr/session/session
import glimr/http/context
import app/app.{type App}
props(ctx: context.Context(App))
---

<x-layouts:app>
  <slot name="meta_title">Login</slot>
  <div class="flex items-center justify-center min-h-screen">
    <div
      class="flex flex-col gap-4 w-lg p-8 border border-border bg-card rounded-lg shadow-md"
    >
      <h1 class="text-2xl font-semibold text-center">Welcome back</h1>
      <div
        l-if="session.has_flash(ctx.session, 'error')"
        class="p-3 bg-destructive-background-subtle border border-destructive-border text-destructive rounded"
      >
        {{ session.get_flash(ctx.session, "error") }}
      </div>
      <form method="post" action="/login" class="contents">
        <x-input
          id="email"
          name="email"
          type="email"
          label="Email Address"
          :session="ctx.session"
        />
        <x-input
          id="password"
          name="password"
          type="password"
          label="Password"
          :session="ctx.session"
        />
        <x-button type="submit">Login</x-button>
      </form>
      <p class="text-center text-sm text-muted-foreground">
        Don't have an account?
        <x-link href="/register" class="ml-0.5">Register</x-link>
      </p>
    </div>
  </div>
</x-layouts:app>
