# Session Config
#
# Session configuration for your application. The session
# driver is chosen in your bootstrap via code (e.g.
# session.cookie_store(), postgres.session_store(pool), etc.)
# piped into session.setup(). These settings apply to
# whichever driver you use.

# The cookie name used to store the session ID.
cookie = "glimr_session"

# Session lifetime in minutes. After this duration of
# inactivity, the session will be eligible for garbage
# collection (database/file drivers).
lifetime = 120

# If true, the session cookie expires when the browser
# closes (no max-age is set). If false, the cookie
# persists for the lifetime duration.
expire_on_close = false

# The database table name used by database drivers
# (postgres, sqlite). Ignored by cookie/file/redis drivers.
# Run `./glimr make_session_table` to generate the
# migration for this table.
table = "sessions"
